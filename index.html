<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insurance Surrender Calculator</title>
    <script>
      // Global error suppression for the fetch getter error
      window.addEventListener('error', function(e) {
        if (e.message && e.message.includes('Cannot set property fetch')) {
          e.preventDefault();
          e.stopPropagation();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
